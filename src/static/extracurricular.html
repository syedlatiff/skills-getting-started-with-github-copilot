<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extracurricular Activities - Mergington High School</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities Hub</h2>
      <nav class="header-nav">
        <a href="index.html">Home</a>
        <a href="extracurricular.html" class="active">All Activities</a>
      </nav>
    </header>

    <main class="extracurricular-main">
      <aside class="filters-sidebar">
        <h3>Filter Activities</h3>
        
        <div class="filter-group">
          <h4>Category</h4>
          <div class="filter-options">
            <label>
              <input type="checkbox" class="category-filter" value="All" checked /> All
            </label>
            <label>
              <input type="checkbox" class="category-filter" value="Sports" /> Sports
            </label>
            <label>
              <input type="checkbox" class="category-filter" value="Arts" /> Arts
            </label>
            <label>
              <input type="checkbox" class="category-filter" value="Academic" /> Academic
            </label>
            <label>
              <input type="checkbox" class="category-filter" value="Technology" /> Technology
            </label>
          </div>
        </div>

        <div class="filter-group">
          <h4>Availability</h4>
          <div class="filter-options">
            <label>
              <input type="checkbox" class="availability-filter" value="available" checked /> Available
            </label>
            <label>
              <input type="checkbox" class="availability-filter" value="full" /> Full
            </label>
          </div>
        </div>

        <button id="clear-filters" class="secondary-btn">Clear Filters</button>
      </aside>

      <div class="activities-content">
        <div class="activities-header">
          <h3>All Activities</h3>
          <div class="sort-controls">
            <label for="sort-by">Sort by:</label>
            <select id="sort-by">
              <option value="name">Name (A-Z)</option>
              <option value="availability">Availability</option>
              <option value="schedule">Schedule</option>
            </select>
          </div>
        </div>

        <div id="activities-grid" class="activities-grid">
          <!-- Activities will be loaded here -->
          <p class="loading">Loading activities...</p>
        </div>
      </div>

      <!-- Activity Detail Modal -->
      <div id="activity-modal" class="modal hidden">
        <div class="modal-content">
          <span class="close-modal">&times;</span>
          <h3 id="modal-activity-name"></h3>
          <div id="modal-activity-details"></div>
          <form id="modal-signup-form">
            <div class="form-group">
              <label for="modal-email">Student Email:</label>
              <input type="email" id="modal-email" required placeholder="your-email@mergington.edu" />
            </div>
            <button type="submit" id="modal-signup-btn">Sign Up for Activity</button>
          </form>
          <div id="modal-message" class="hidden"></div>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School - Extracurricular Activities</p>
    </footer>

    <script src="extracurricular.js"></script>
  </body>
</html>
